              <ellipse cx="104" cy="94" rx="4" ry="6" fill="#FFFFFF" transform="rotate(-12 104 94)" />
            </g>

            {/* Right Eye */}
            <g style={{ transformOrigin: '165px 90px', animation: 'blink 4s infinite' }}>
              <ellipse cx="165" cy="90" rx="24" ry="34" fill="#FFFDE7" transform="rotate(-6 165 90)" />
              <ellipse cx="168" cy="92" rx="12" ry="22" fill="#1A1A1A" transform="rotate(-6 168 92)" />
              {/* Pupil highlight */}
              <ellipse cx="172" cy="84" rx="3" ry="5" fill="#FFFFFF" transform="rotate(-6 172 84)" />
