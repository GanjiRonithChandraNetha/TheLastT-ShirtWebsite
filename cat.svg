            {/* Left Ear */}
            <path d="M 65 75 Q 35 15 95 40 Z" fill="#1A1A1A" />
            
            {/* Right Ear */}
            <path d="M 145 40 Q 210 10 185 85 Z" fill="#1A1A1A" />
