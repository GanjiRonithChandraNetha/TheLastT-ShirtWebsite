<svg viewBox="0 0 250 250" width="220" height="220" style={{ overflow: 'visible' }}>
          
          {/* Tail */}
          <g style={{ transformOrigin: '140px 170px', animation: 'tail-wag 4s ease-in-out infinite' }}>
            <path d="M 140 170 C 190 170 240 200 210 240 C 190 260 120 250 100 240" fill="none" stroke="#1A1A1A" strokeWidth="16" strokeLinecap="round" />
          </g>

          {/* Body */}
          <ellipse cx="130" cy="170" rx="42" ry="45" fill="#1A1A1A" />
          
          {/* Paws */}
          <path d="M 105 190 Q 95 220 102 225 Q 115 225 115 190 Z" fill="#1A1A1A" />
          <path d="M 130 190 Q 120 225 130 230 Q 145 230 145 190 Z" fill="#1A1A1A" />

          {/* Head Group */}
