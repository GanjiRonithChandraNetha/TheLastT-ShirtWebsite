            {/* Head Base */}
            <ellipse cx="125" cy="100" rx="70" ry="60" fill="#1A1A1A" />

            {/* Left Eye */}
            <g style={{ transformOrigin: '90px 100px', animation: 'blink 4s infinite' }}>
              <ellipse cx="90" cy="100" rx="30" ry="40" fill="#FFFDE7" transform="rotate(-12 90 100)" />
              <ellipse cx="98" cy="102" rx="16" ry="26" fill="#1A1A1A" transform="rotate(-12 98 102)" />
